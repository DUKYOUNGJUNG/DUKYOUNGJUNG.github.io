<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>[DEBUG] 테스트 보상 — 심연석 50개</title>
<link rel="stylesheet" href="notice.css">
</head>
<body>

<h1>[DEBUG] 테스트 보상</h1>
<p class="subtitle">2026-05-20 · <span class="badge badge-event">이벤트</span> · DEBUG 빌드 전용</p>

<section>
    <h2>보상 지급 흐름 검증용 페이지</h2>
    <p>이 공지는 <code>debug_only: true</code>로 등록돼 있어 Xcode DEBUG 실행 시에만 노출됩니다. TestFlight/출시 빌드에서는 보이지 않습니다.</p>
    <p>아래 보상 카드에서 받을 슬롯을 선택하고 <strong>받기</strong>를 누르면 해당 슬롯에 심연석이 지급됩니다. 디바이스 단위 1회 보장 — 다른 슬롯에서도 다시 받을 수 없습니다.</p>
</section>

<section>
    <h2>보상 받기</h2>
    <div class="reward-card" id="reward-card" data-reward-id="test_debug_50_stones">
        <div class="reward-title" id="reward-title">로딩 중...</div>
        <div class="reward-amount" id="reward-amount">&nbsp;</div>
        <div id="reward-slot-list" class="reward-slot-list"></div>
        <div id="reward-status"></div>
        <button id="reward-btn" class="reward-btn" disabled>받기</button>
        <button id="reset-btn" class="reward-btn" style="background:#374151;margin-top:8px;">[DEBUG] 수령 기록 재설정</button>
    </div>
</section>

<script>
// --- 브릿지 호출 헬퍼 ---
window._bridgeCallbacks = {};
window.bridgeReply = function(requestId, result) {
    const cb = window._bridgeCallbacks[requestId];
    if (cb) {
        delete window._bridgeCallbacks[requestId];
        cb(result);
    }
};
function bridgeCall(method, params) {
    return new Promise(function(resolve, reject) {
        if (!window.webkit || !window.webkit.messageHandlers || !window.webkit.messageHandlers.bridge) {
            reject(new Error("bridge_unavailable"));
            return;
        }
        const id = Math.random().toString(36).slice(2);
        window._bridgeCallbacks[id] = resolve;
        window.webkit.messageHandlers.bridge.postMessage({
            request_id: id,
            method: method,
            params: params || {}
        });
    });
}

// --- 상태 / DOM 캐싱 ---
const card = document.getElementById('reward-card');
const rewardId = card.dataset.rewardId;
const titleEl = document.getElementById('reward-title');
const amountEl = document.getElementById('reward-amount');
const slotListEl = document.getElementById('reward-slot-list');
const statusEl = document.getElementById('reward-status');
const btnEl = document.getElementById('reward-btn');
let selectedSlotId = null;

function setStatus(text, kind) {
    if (!text) {
        statusEl.innerHTML = '';
        statusEl.className = '';
        return;
    }
    statusEl.className = 'reward-status ' + (kind || '');
    statusEl.textContent = text;
}

function renderSlots(slots) {
    slotListEl.innerHTML = '';
    if (!slots || slots.length === 0) {
        slotListEl.innerHTML = '<div class="slot-meta">받을 수 있는 슬롯이 없습니다. 캐릭터를 먼저 생성해주세요.</div>';
        return;
    }
    slots.forEach(function(slot) {
        const item = document.createElement('div');
        item.className = 'reward-slot-item';
        item.dataset.slotId = slot.slotId;
        const stonesNow = (slot.abyssStones != null) ? slot.abyssStones : '?';
        item.innerHTML =
            '<div style="flex:1">' +
                '<div><strong>' + escapeHtml(slot.name || slot.slotId) + '</strong></div>' +
                '<div class="slot-meta">' + escapeHtml(slot.playerClass) + ' · 심연석 ' + stonesNow + '개</div>' +
            '</div>';
        item.addEventListener('click', function() {
            selectedSlotId = slot.slotId;
            Array.from(slotListEl.querySelectorAll('.reward-slot-item')).forEach(function(el) {
                el.classList.toggle('selected', el.dataset.slotId === selectedSlotId);
            });
            btnEl.disabled = false;
        });
        slotListEl.appendChild(item);
    });
}

function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
}

// --- 초기 상태 조회 ---
async function refresh() {
    setStatus('', '');
    btnEl.disabled = true;
    try {
        const res = await bridgeCall('checkRewardStatus', { rewardId: rewardId });
        titleEl.textContent = res.displayName || '보상';
        amountEl.textContent = '심연석 ' + (res.stones || 0) + '개';
        if (res.claimed) {
            slotListEl.innerHTML = '';
            setStatus('이미 보상을 수령했습니다.', 'done');
            btnEl.textContent = '수령 완료';
            btnEl.disabled = true;
        } else {
            renderSlots(res.slots || []);
            btnEl.textContent = '받기';
            btnEl.disabled = (selectedSlotId == null);
        }
    } catch (e) {
        titleEl.textContent = '보상 정보를 불러올 수 없습니다';
        amountEl.textContent = '';
        setStatus('앱 내 공지에서 열어주세요. (' + e.message + ')', 'error');
    }
}

const resetBtnEl = document.getElementById('reset-btn');
resetBtnEl.addEventListener('click', async function() {
    if (!confirm('수령 기록을 재설정합니다. (이미 지급된 심연석은 회수되지 않음)')) return;
    resetBtnEl.disabled = true;
    try {
        const res = await bridgeCall('resetClaim', { rewardId: rewardId });
        if (res.ok) {
            setStatus('수령 기록을 재설정했습니다.', 'done');
            setTimeout(refresh, 400);
        } else {
            setStatus('재설정 실패: ' + (res.error || 'unknown'), 'error');
        }
    } catch (e) {
        setStatus('통신 오류: ' + e.message, 'error');
    } finally {
        resetBtnEl.disabled = false;
    }
});

btnEl.addEventListener('click', async function() {
    if (!selectedSlotId) return;
    btnEl.disabled = true;
    try {
        const res = await bridgeCall('claimReward', { rewardId: rewardId, slotId: selectedSlotId });
        if (res.ok) {
            setStatus('심연석 ' + (res.stones || 0) + '개 지급 완료!', 'done');
            btnEl.textContent = '수령 완료';
            // 잠시 후 다시 조회해 갱신된 슬롯 상태 + claimed 표시 노출
            setTimeout(refresh, 800);
        } else {
            const msg = ({
                already_claimed: '이미 다른 슬롯에서 수령했습니다.',
                slot_not_found: '슬롯을 찾을 수 없습니다.',
                invalid_reward: '유효하지 않은 보상입니다.'
            })[res.error] || '보상 지급에 실패했습니다.';
            setStatus(msg, 'error');
            btnEl.disabled = false;
        }
    } catch (e) {
        setStatus('통신 오류: ' + e.message, 'error');
        btnEl.disabled = false;
    }
});

refresh();
</script>

</body>
</html>
